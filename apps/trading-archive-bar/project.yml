name: TradingArchiveBar
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: $(TARGET_NAME)
    CODE_SIGN_STYLE: Automatic
targets:
  TradingArchiveBar:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: TradingArchiveBarApp/Sources
    info:
      path: TradingArchiveBarApp/Info.plist
      properties:
        CFBundleDisplayName: Trading Archive Bar
        LSApplicationCategoryType: public.app-category.finance
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.TradingArchiveBar
        INFOPLIST_FILE: TradingArchiveBarApp/Info.plist
        PRODUCT_MODULE_NAME: TradingArchiveBar

  TradingArchiveBarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: TradingArchiveBarApp/Tests
    dependencies:
      - target: TradingArchiveBar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.TradingArchiveBarTests

schemes:
  TradingArchiveBar:
    build:
      targets:
        TradingArchiveBar: all
        TradingArchiveBarTests: [test]
    test:
      targets:
        - TradingArchiveBarTests
