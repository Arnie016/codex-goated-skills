name: XboxStudio
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: $(TARGET_NAME)
    CODE_SIGN_STYLE: Automatic
targets:
  XboxStudio:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: XboxStudioApp/Sources
    info:
      path: XboxStudioApp/Info.plist
      properties:
        CFBundleDisplayName: Xbox Studio
        LSApplicationCategoryType: public.app-category.utilities
        NSBluetoothAlwaysUsageDescription: Xbox Studio checks Bluetooth readiness so you can pair and monitor supported Xbox controllers.
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.XboxStudio
        INFOPLIST_FILE: XboxStudioApp/Info.plist
        PRODUCT_MODULE_NAME: XboxStudio
schemes:
  XboxStudio:
    build:
      targets:
        XboxStudio: all
