name: TeleBar
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: $(TARGET_NAME)
    CODE_SIGN_STYLE: Automatic
targets:
  TeleBar:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: TeleBarApp/Sources
    info:
      path: TeleBarApp/Info.plist
      properties:
        CFBundleDisplayName: TeleBar
        LSApplicationCategoryType: public.app-category.social-networking
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.TeleBar
        INFOPLIST_FILE: TeleBarApp/Info.plist
        PRODUCT_MODULE_NAME: TeleBar
schemes:
  TeleBar:
    build:
      targets:
        TeleBar: all
