name: PhoneSpotter
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: $(TARGET_NAME)
    CODE_SIGN_STYLE: Automatic
targets:
  PhoneSpotter:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: PhoneSpotterApp/Sources
    info:
      path: PhoneSpotterApp/Info.plist
      properties:
        CFBundleDisplayName: Phone Spotter
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.PhoneSpotter
        INFOPLIST_FILE: PhoneSpotterApp/Info.plist
        PRODUCT_MODULE_NAME: PhoneSpotter

  PhoneSpotterTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: PhoneSpotterApp/Tests
    dependencies:
      - target: PhoneSpotter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.PhoneSpotterTests
schemes:
  PhoneSpotter:
    build:
      targets:
        PhoneSpotter: all
        PhoneSpotterTests: [test]
    test:
      targets:
        - PhoneSpotterTests
