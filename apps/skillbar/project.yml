name: SkillBar
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: $(TARGET_NAME)
    CODE_SIGN_STYLE: Automatic
targets:
  SkillBar:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: SkillBarApp/Sources
    info:
      path: SkillBarApp/Info.plist
      properties:
        CFBundleDisplayName: SkillBar
        LSApplicationCategoryType: public.app-category.developer-tools
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_NAME: SkillBar
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.SkillBar
        INFOPLIST_FILE: SkillBarApp/Info.plist
        PRODUCT_MODULE_NAME: SkillBar

  SkillBarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: SkillBarApp/Tests
    dependencies:
      - target: SkillBar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.SkillBarTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SkillBar.app/Contents/MacOS/SkillBar"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  SkillBar:
    build:
      targets:
        SkillBar: all
        SkillBarTests: [test]
    test:
      targets:
        - SkillBarTests
