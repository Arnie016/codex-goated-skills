name: WifiWatchtower
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: $(TARGET_NAME)
    CODE_SIGN_STYLE: Automatic
targets:
  WifiWatchtower:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: WifiWatchtowerApp/Sources
    info:
      path: WifiWatchtowerApp/Info.plist
      properties:
        CFBundleDisplayName: WifiWatchtower
        LSApplicationCategoryType: public.app-category.utilities
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnav.WifiWatchtower
        INFOPLIST_FILE: WifiWatchtowerApp/Info.plist
        PRODUCT_MODULE_NAME: WifiWatchtower
schemes:
  WifiWatchtower:
    build:
      targets:
        WifiWatchtower: all
