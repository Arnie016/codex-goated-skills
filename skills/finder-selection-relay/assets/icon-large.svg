<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Finder Selection Relay">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111B"/>
      <stop offset="100%" stop-color="#04070C"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101924"/>
      <stop offset="100%" stop-color="#0B131C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)"/>
  <circle cx="980" cy="108" r="118" fill="#0A84FF" opacity="0.16"/>
  <circle cx="146" cy="520" r="146" fill="#5AC8FA" opacity="0.08"/>
  <rect x="64" y="64" width="1072" height="502" rx="36" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="104" y="154" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="24" font-weight="700" fill="#9CB3C9">Generated macOS skill prototype</text>
  <text x="104" y="242" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="58" font-weight="800" fill="#FFFFFF">Finder Selection Relay</text>
  <text x="104" y="292" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="28" fill="#DAE8F7">A quiet Finder handoff for files, folders, and clean paths.</text>
  <text x="104" y="350" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="26" fill="#FFFFFF">Turn the current Finder selection into prompt, note, ticket, or shell-ready context.</text>
  <rect x="104" y="392" width="340" height="8" rx="4" fill="url(#accent)"/>
  <text x="104" y="450" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#DAE8F7">Reads the current Finder selection and local metadata without opening file contents.</text>
  <text x="104" y="492" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#DAE8F7">Formats exact paths for prompts, markdown notes, ticket bullets, and shell-safe lists.</text>
  <text x="104" y="534" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#DAE8F7">Keeps the handoff menu-bar first so selected items travel cleanly into the next tool.</text>
  <rect x="788" y="132" width="264" height="300" rx="30" fill="#0C141D" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <path d="M824 182c0-14.4 11.6-26 26-26h54l20 20h74c14.4 0 26 11.6 26 26v10H824v-30z" fill="#FFFFFF" fill-opacity="0.10"/>
  <rect x="824" y="200" width="204" height="126" rx="26" fill="url(#accent)"/>
  <rect x="850" y="226" width="62" height="62" rx="14" fill="#FFFFFF" fill-opacity="0.18"/>
  <path d="M866 246h30m-30 16h40m-40 16h46" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <text x="850" y="364" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">Finder Selection Relay</text>
  <text x="850" y="398" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20" fill="#DAE8F7">Workflow Automation</text>
  <text x="850" y="430" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" fill="#9CB3C9">Exact paths, small metadata, no content reads.</text>
</svg>
