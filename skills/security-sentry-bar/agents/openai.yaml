interface:
  display_name: "Security Sentry Bar"
  short_description: "SwiftBar host-security monitor for ports, agents, processes, and recent file changes"
  icon_small: "./assets/security-sentry-bar-small.svg"
  icon_large: "./assets/security-sentry-bar-large.svg"
