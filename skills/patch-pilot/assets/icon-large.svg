<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Patch Pilot">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#05070B"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121923"/>
      <stop offset="100%" stop-color="#0C1118"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30D158"/>
      <stop offset="100%" stop-color="#9AF0B8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)"/>
  <circle cx="980" cy="112" r="122" fill="#30D158" opacity="0.16"/>
  <circle cx="146" cy="520" r="150" fill="#30D158" opacity="0.08"/>
  <rect x="64" y="64" width="1072" height="502" rx="36" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="104" y="154" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="24" font-weight="700" fill="#9CA3AF">Generated macOS skill prototype</text>
  <text x="104" y="244" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="60" font-weight="800" fill="#FFFFFF">Patch Pilot</text>
  <text x="104" y="294" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="28" fill="#D1D5DB">A menu-bar patch triage panel for fix briefs, risk notes, and the next safe command.</text>
  <text x="104" y="352" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="26" fill="#FFFFFF">Turn a diff into the next safe move.</text>
  <rect x="104" y="394" width="320" height="8" rx="4" fill="url(#accent)"/>
  <text x="104" y="452" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#D1D5DB">Turns a copied diff or file list into the next safe move before the tool-switching spiral starts.</text>
  <text x="104" y="494" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#D1D5DB">Keeps touched surfaces, likely regressions, and reply-ready notes in one compact panel.</text>
  <text x="104" y="536" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#D1D5DB">Fits the pre-commit, pre-review, and pre-handoff moment where context usually fragments.</text>
  <rect x="786" y="132" width="262" height="294" rx="28" fill="#0E131A" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <rect x="814" y="160" width="112" height="112" rx="28" fill="#30D158" opacity="0.94"/>
  <text x="870" y="228" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="42" font-weight="800" fill="#FFFFFF">PP</text>
  <text x="814" y="310" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Patch Pilot</text>
  <text x="814" y="348" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20" fill="#D1D5DB">Developer Tools</text>
  <text x="814" y="388" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" fill="#9CA3AF">Menu-bar first, calm, useful.</text>
</svg>
