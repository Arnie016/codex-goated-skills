<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Deck Export Bundle">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#05070B"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121923"/>
      <stop offset="100%" stop-color="#0C1118"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)"/>
  <circle cx="980" cy="110" r="120" fill="#FFD60A" opacity="0.16"/>
  <circle cx="140" cy="520" r="150" fill="#FFD60A" opacity="0.08"/>
  <rect x="64" y="64" width="1072" height="502" rx="36" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="104" y="154" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="24" font-weight="700" fill="#9CA3AF">Generated macOS skill prototype</text>
  <text x="104" y="244" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="60" font-weight="800" fill="#FFFFFF">Deck Export Bundle</text>
  <text x="104" y="294" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="28" fill="#D1D5DB">A compact export lane for polished slide handoffs from the menu bar.</text>
  <text x="104" y="352" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="26" fill="#FFFFFF">Package the deck, notes, and share files before the meeting starts.</text>
  <rect x="104" y="394" width="320" height="8" rx="4" fill="url(#accent)"/>
  <text x="104" y="452" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#D1D5DB">Pulls the live deck, speaker notes, and output format into one send-ready bundle card.</text>
  <text x="104" y="494" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#D1D5DB">Keeps PDF export, notes text, and reveal-in-Finder actions together before the handoff leaves your Mac.</text>
  <text x="104" y="536" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" fill="#D1D5DB">Turns last-mile deck packaging into one calm menu-bar step instead of a Finder and chat scramble.</text>
  <rect x="792" y="132" width="250" height="292" rx="28" fill="#0E131A" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <rect x="818" y="160" width="110" height="110" rx="26" fill="#FFD60A" opacity="0.92"/>
  <text x="873" y="228" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="42" font-weight="800" fill="#FFFFFF">DE</text>
  <text x="818" y="308" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Deck Export Bundle</text>
  <text x="818" y="346" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20" fill="#D1D5DB">Presentation</text>
  <text x="818" y="386" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" fill="#9CA3AF">Menu-bar first, calm, useful.</text>
</svg>
